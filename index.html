<!doctype html>

<html lang="fr">
  <head>
    <!-- Basic setup -->

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LinguaLearn</title>

    <!-- Styles -->

    <link rel="stylesheet" href="css/style.css" />

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- ===================== -->
    <!-- NAVBAR -->
    <!-- ===================== -->

    <header class="navbar">
      <!-- Logo -->

      <div class="logo">
        <img src="./assets/logo.png" alt="LinguaLearn logo" class="logo-icon" />

        <div class="logo-text">
          <h1>LinguaLearn</h1>

          <span>EN → DE</span>
        </div>
      </div>

      <!-- Navigation -->

      <nav class="nav-menu">
        <button class="nav-btn active" data-page="home">Home</button>

        <button class="nav-btn" data-page="flashcards">Flashcards</button>

        <button class="nav-btn" data-page="vocabulary">Vocabulary</button>
      </nav>
    </header>

    <!-- ===================== -->
    <!-- MAIN APP -->
    <!-- ===================== -->

    <main id="app" class="container"></main>

    <!-- App entry point -->

    <script type="module" src="js/app.js"></script>
  </body>
</html>
